version: '3.8'

services:

  postgres:
    image: postgres:16
    container_name: postgres-lanchonete
    environment:
      POSTGRES_DB: lanchonete_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
    ports:
      - "5433:5432"

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq-lanchonete
    ports:
      - "5672:5672"
      - "15672:15672"